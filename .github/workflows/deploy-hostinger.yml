name: Deploy Entheotiki

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package release
        run: |
          tar -czf release.tar.gz \
            package.json \
            package-lock.json \
            server.js \
            build \
            public \
            static

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Upload release tarball
        run: |
          scp -P ${{ secrets.HOSTINGER_PORT }} \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            release.tar.gz \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:/home/reed/apps/entheotiki/release.tar.gz
            
      - name: Activate release on VPS
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'
              set -e

              APP_ROOT="/home/reed/apps/entheotiki"
              RELEASE_ID="$(date +%Y%m%d%H%M%S)"
              RELEASE_DIR="$APP_ROOT/releases/$RELEASE_ID"

              mkdir -p "$APP_ROOT/releases"
              mkdir -p "$RELEASE_DIR"

              tar -xzf "$APP_ROOT/release.tar.gz" -C "$RELEASE_DIR"

              cd "$RELEASE_DIR"

              npm ci
              npm install pm2

              ln -sfn "$RELEASE_DIR" "$APP_ROOT/current"

              cd "$APP_ROOT/current"
              ./node_modules/.bin/pm2 restart entheotiki --update-env || ./node_modules/.bin/pm2 start npm --name entheotiki -- run start
              ./node_modules/.bin/pm2 save
            EOF
