name: Deploy Entheotiki Globe to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Generate index.html
        run: python3 generate-index.py

      - name: Create clean tarball
        run: |
          tar czf /tmp/deploy.tar.gz \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=static \
            --exclude=README.md \
            --exclude=DEPLOY.md \
            .

      - name: Upload to Hostinger VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "/tmp/deploy.tar.gz"
          target: "/tmp/"

      - name: Extract and restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            NODE=/root/.nvm/versions/node/v20.20.2/bin/node
            NPM=/root/.nvm/versions/node/v20.20.2/bin/npm
            PM2=/root/.nvm/versions/node/v20.20.2/bin/pm2
            cd ${{ secrets.HOSTINGER_APP_DIR }}
            tar xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz
            $NPM install --omit=dev
            $PM2 restart entheotiki || $PM2 start server.js --name entheotiki
            $PM2 save
